name: Deploy website to GitHub Pages

on:
  # Ejecuta el flujo cuando haces push a la rama main
  push:
    branches: ["main"]
  # Permite ejecutarlo manualmente si lo necesitas
  workflow_dispatch:

# Permisos necesarios para que GitHub Actions publique la página
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que múltiples publicaciones se crucen al mismo tiempo
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ¡Aquí está la magia! Le decimos que publique solo esta carpeta
          path: './website'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
